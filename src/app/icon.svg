<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0a0a0f"/>
  <!-- Pulsing halo behind the bulb -->
  <circle cx="32" cy="27" r="17" fill="url(#glow)">
    <animate attributeName="opacity" values="0.45;1;0.45" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="r" values="15;19;15" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <!-- Bulb glass -->
  <path d="M32 12c-7.2 0-13 5.6-13 12.5 0 4.7 2.6 8.2 5.2 10.7 1.4 1.3 2.3 2.7 2.6 4.3h10.4c0.3-1.6 1.2-3 2.6-4.3 2.6-2.5 5.2-6 5.2-10.7C45 17.6 39.2 12 32 12z"
        fill="#0a0a0f" stroke="#22d3ee" stroke-width="2.4" stroke-linejoin="round">
    <animate attributeName="stroke" values="#22d3ee;#7de9f7;#22d3ee" dur="1.8s" repeatCount="indefinite"/>
  </path>
  <!-- Filament -->
  <path d="M28 24l4 4 4-4" fill="none" stroke="#22d3ee" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Screw base -->
  <rect x="27" y="44" width="10" height="3.4" rx="1.5" fill="#22d3ee"/>
  <rect x="28.5" y="49" width="7" height="3.2" rx="1.5" fill="#22d3ee"/>
</svg>
